<div class="min-h-screen flex flex-col items-center justify-center bg-gradient-to-b from-[var(--color-arona-500)] to-[var(--color-arona-700)] p-4">
  <!-- Top Shield Icon -->
  <div class="mb-4 animate-fade-in">
    <div class="w-16 h-16 bg-white/10 backdrop-blur rounded-2xl flex items-center justify-center border border-white/20">
      <span class="material-icons-outlined text-white text-3xl">admin_panel_settings</span>
    </div>
  </div>
  <p class="text-white/70 text-sm mb-6">Panel de Administración</p>

  <!-- Card -->
  <div class="w-full max-w-md animate-scale-in">
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <div class="text-center mb-6">
        <div class="inline-flex items-center gap-2 mb-2">
          <div class="w-9 h-9 bg-[var(--color-arona-500)] rounded-xl flex items-center justify-center">
            <span class="material-icons-outlined text-white text-lg">eco</span>
          </div>
          <span class="text-2xl font-bold text-[var(--color-arona-500)]">Arona</span>
        </div>
        <h1 class="text-xl font-bold text-[var(--color-text-primary)]">Acceso Administrador</h1>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-[var(--color-text-primary)] mb-1.5">Correo Administrador</label>
          <div class="relative">
            <input type="email" formControlName="correo" placeholder="admin&#64;arona.com.pe"
              class="w-full px-4 py-3 bg-gray-50 border border-[var(--color-border)] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[var(--color-arona-500)]/20 focus:border-[var(--color-arona-500)] transition-all placeholder-gray-400" />
            <span class="material-icons-outlined absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xl">mail</span>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-[var(--color-text-primary)] mb-1.5">Contraseña</label>
          <div class="relative">
            <input [type]="showPassword() ? 'text' : 'password'" formControlName="password" placeholder="••••••••"
              class="w-full px-4 py-3 bg-gray-50 border border-[var(--color-border)] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[var(--color-arona-500)]/20 focus:border-[var(--color-arona-500)] transition-all placeholder-gray-400" />
            <button type="button" (click)="showPassword.set(!showPassword())"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 bg-transparent border-none cursor-pointer">
              <span class="material-icons-outlined text-xl">{{ showPassword() ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </div>
        </div>

        <!-- Demo Credentials -->
        <div class="p-3 bg-[var(--color-arona-50)] border border-[var(--color-arona-200)] rounded-xl">
          <p class="text-xs font-semibold text-[var(--color-arona-500)] mb-1">Demo credenciales:</p>
          <p class="text-xs text-[var(--color-arona-600)]">Email: admin&#64;arona.com.pe</p>
          <p class="text-xs text-[var(--color-arona-600)]">Contraseña: admin123</p>
        </div>

        <button type="submit" [disabled]="loginForm.invalid || isLoading()"
          class="w-full py-3 bg-[var(--color-arona-800)] text-white rounded-xl font-semibold text-sm flex items-center justify-center gap-2 hover:bg-[var(--color-arona-900)] transition-all disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer border-none">
          @if (isLoading()) {
            <span class="animate-spin material-icons-outlined">refresh</span>
          } @else {
            <span class="material-icons-outlined text-lg">admin_panel_settings</span>
            Ingresar al Panel
          }
        </button>
      </form>

      @if (errorMessage()) {
        <div class="mt-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600 animate-fade-in flex items-center gap-2">
          <span class="material-icons-outlined text-lg">error</span>
          {{ errorMessage() }}
        </div>
      }

      <p class="text-center text-sm text-[var(--color-text-muted)] mt-5">
        <a routerLink="/auth/login" class="hover:text-[var(--color-arona-500)] transition-colors">← Volver al inicio de sesión</a>
      </p>
    </div>
  </div>
</div>
