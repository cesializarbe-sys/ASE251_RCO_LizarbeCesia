<div class="min-h-screen flex items-center justify-center bg-gray-500/50 p-4">
  <div class="w-full max-w-2xl animate-scale-in">
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <!-- Logo -->
      <div class="text-center mb-6">
        <div class="inline-flex items-center gap-2 mb-2">
          <div class="w-9 h-9 bg-[var(--color-arona-500)] rounded-xl flex items-center justify-center">
            <span class="material-icons-outlined text-white text-lg">eco</span>
          </div>
          <span class="text-2xl font-bold text-[var(--color-arona-500)]">Arona</span>
        </div>
        <h1 class="text-xl font-bold text-[var(--color-text-primary)]">Crear Cuenta Nueva</h1>
        <p class="text-sm text-[var(--color-text-muted)]">Sociedad Agrícola Arona S.A</p>
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Nombre -->
          <div>
            <label class="block text-sm font-medium text-[var(--color-text-primary)] mb-1">Nombre(s)</label>
            <div class="relative">
              <input type="text" formControlName="nombre" placeholder="Jose Armando"
                class="w-full px-4 py-2.5 bg-[var(--color-arona-50)]/30 border border-[var(--color-border)] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[var(--color-arona-500)]/20 focus:border-[var(--color-arona-500)] transition-all placeholder-gray-400" />
              <span class="material-icons-outlined absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg">person</span>
            </div>
          </div>
          <!-- Apellidos -->
          <div>
            <label class="block text-sm font-medium text-[var(--color-text-primary)] mb-1">Apellidos</label>
            <div class="relative">
              <input type="text" formControlName="apellidos" placeholder="Huamani Quispe"
                class="w-full px-4 py-2.5 bg-[var(--color-arona-50)]/30 border border-[var(--color-border)] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[var(--color-arona-500)]/20 focus:border-[var(--color-arona-500)] transition-all placeholder-gray-400" />
              <span class="material-icons-outlined absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg">person</span>
            </div>
          </div>
          <!-- Correo -->
          <div>
            <label class="block text-sm font-medium text-[var(--color-text-primary)] mb-1">Correo electrónico</label>
            <div class="relative">
              <input type="email" formControlName="correo" placeholder="correo&#64;arona.com.pe"
                class="w-full px-4 py-2.5 bg-[var(--color-arona-50)]/30 border border-[var(--color-border)] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[var(--color-arona-500)]/20 focus:border-[var(--color-arona-500)] transition-all placeholder-gray-400" />
              <span class="material-icons-outlined absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg">mail</span>
            </div>
          </div>
          <!-- DNI -->
          <div>
            <label class="block text-sm font-medium text-[var(--color-text-primary)] mb-1">DNI</label>
            <div class="relative">
              <input type="text" formControlName="dni" placeholder="45678900"
                class="w-full px-4 py-2.5 bg-[var(--color-arona-50)]/30 border border-[var(--color-border)] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[var(--color-arona-500)]/20 focus:border-[var(--color-arona-500)] transition-all placeholder-gray-400" />
              <span class="material-icons-outlined absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg">badge</span>
            </div>
          </div>
          <!-- Teléfono -->
          <div>
            <label class="block text-sm font-medium text-[var(--color-text-primary)] mb-1">Teléfono</label>
            <div class="relative">
              <input type="tel" formControlName="telefono" placeholder="+51 987 654 321"
                class="w-full px-4 py-2.5 bg-[var(--color-arona-50)]/30 border border-[var(--color-border)] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[var(--color-arona-500)]/20 focus:border-[var(--color-arona-500)] transition-all placeholder-gray-400" />
              <span class="material-icons-outlined absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg">phone</span>
            </div>
          </div>
          <!-- Dirección -->
          <div>
            <label class="block text-sm font-medium text-[var(--color-text-primary)] mb-1">Dirección</label>
            <div class="relative">
              <input type="text" formControlName="direccion" placeholder="Jr. Los Álamos 234, Ica"
                class="w-full px-4 py-2.5 bg-[var(--color-arona-50)]/30 border border-[var(--color-border)] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[var(--color-arona-500)]/20 focus:border-[var(--color-arona-500)] transition-all placeholder-gray-400" />
              <span class="material-icons-outlined absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg">location_on</span>
            </div>
          </div>
          <!-- Área -->
          <div>
            <label class="block text-sm font-medium text-[var(--color-text-primary)] mb-1">Área</label>
            <div class="relative">
              <select formControlName="area"
                class="w-full px-4 py-2.5 bg-[var(--color-arona-50)]/30 border border-[var(--color-border)] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[var(--color-arona-500)]/20 focus:border-[var(--color-arona-500)] transition-all appearance-none cursor-pointer">
                <option value="">Seleccionar área</option>
                <option value="CAMPO">Campo</option>
                <option value="PLANTA">Planta</option>
                <option value="ALMACEN">Almacén</option>
                <option value="ADMINISTRACION">Administración</option>
                <option value="CALIDAD">Calidad</option>
              </select>
              <span class="material-icons-outlined absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg pointer-events-none">expand_more</span>
            </div>
          </div>
          <!-- Password -->
          <div>
            <label class="block text-sm font-medium text-[var(--color-text-primary)] mb-1">Contraseña</label>
            <div class="relative">
              <input [type]="showPassword() ? 'text' : 'password'" formControlName="password" placeholder="Mínimo 6 caracteres"
                class="w-full px-4 py-2.5 bg-[var(--color-arona-50)]/30 border border-[var(--color-border)] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[var(--color-arona-500)]/20 focus:border-[var(--color-arona-500)] transition-all placeholder-gray-400" />
              <button type="button" (click)="showPassword.set(!showPassword())"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 bg-transparent border-none cursor-pointer">
                <span class="material-icons-outlined text-lg">{{ showPassword() ? 'visibility_off' : 'visibility' }}</span>
              </button>
            </div>
          </div>
          <!-- Confirm Password -->
          <div>
            <label class="block text-sm font-medium text-[var(--color-text-primary)] mb-1">Confirmar Contraseña</label>
            <div class="relative">
              <input [type]="showConfirmPassword() ? 'text' : 'password'" formControlName="confirmPassword" placeholder="Repetir contraseña"
                class="w-full px-4 py-2.5 bg-[var(--color-arona-50)]/30 border border-[var(--color-border)] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[var(--color-arona-500)]/20 focus:border-[var(--color-arona-500)] transition-all placeholder-gray-400" />
              <button type="button" (click)="showConfirmPassword.set(!showConfirmPassword())"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 bg-transparent border-none cursor-pointer">
                <span class="material-icons-outlined text-lg">{{ showConfirmPassword() ? 'visibility_off' : 'visibility' }}</span>
              </button>
            </div>
            @if (registerForm.get('confirmPassword')?.touched && registerForm.hasError('passwordMismatch')) {
              <p class="text-xs text-red-500 mt-1">Las contraseñas no coinciden</p>
            }
          </div>
        </div>

        <button type="submit" [disabled]="registerForm.invalid || isLoading()"
          class="arona-btn-primary w-full justify-center py-3 text-base mt-6 disabled:opacity-50 disabled:cursor-not-allowed">
          @if (isLoading()) {
            <span class="animate-spin material-icons-outlined">refresh</span>
          } @else {
            Crear Cuenta
          }
        </button>
      </form>

      <p class="text-center text-sm text-[var(--color-text-secondary)] mt-5">
        ¿Ya tiene cuenta?
        <a routerLink="/auth/login" class="text-[var(--color-arona-500)] font-semibold hover:underline">← Iniciar Sesión</a>
      </p>
    </div>
  </div>
</div>
